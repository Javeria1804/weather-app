<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <style>
        /* Custom Gradient Backgrounds */
        .bg-gradient-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .bg-gradient-card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }

        .bg-gradient-btn {
            background: linear-gradient(135deg, #36d1dc 0%, #5b86e5 100%);
        }

        /* Mobile Sidebar Styling */
        #sidebar {
            transition: transform 0.3s ease-in-out;
            transform: translateX(-100%); /* Hidden by default for mobile */
        }

        #sidebar.open {
            transform: translateX(0); /* Show the sidebar */
        }

        @media (min-width: 768px) {
            #sidebar {
                transform: none; /* Ensure sidebar is visible on desktop */
            }
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- Mobile Hamburger Menu -->
    <header class="flex justify-between items-center bg-gradient-header text-white p-4 md:hidden">
        <h2 class="text-2xl font-bold">Weather App</h2>
        <button id="menu-toggle" class="text-white focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </header>

    <div class="flex flex-col md:flex-row h-screen">
        <!-- Sidebar -->
        <div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-gradient-header text-white p-4 mobile-menu md:relative md:translate-x-0">
            <button id="close-sidebar" class="text-white absolute top-4 right-4 md:hidden">
                <i class="fas fa-times text-xl"></i>
            </button>
            <!-- Profile Icon -->
            <div class="flex items-center mb-6">
                <img src="assets/image.png" alt="Profile" class="rounded-full w-10 h-10 mr-3" />
                <h3 class="text-xl font-bold">Weather App</h3>
            </div>

            <nav>
                <ul class="space-y-4">
                    <li>
                        <a href="index.html" class="block p-3 bg-gradient-btn rounded text-center text-white font-semibold hover:bg-blue-600 transition">Dashboard</a>
                    </li>
                    <li>
                        <a href="forecast.html" class="block p-3 bg-gradient-btn rounded text-center text-white font-semibold hover:bg-blue-600 transition">Forecast</a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="w-full md:w-4/5 p-4 md:p-8 bg-gradient-to-r from-gray-100 to-gray-200">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8">
                <!-- Search Bar -->
                <input id="city-input" type="text" placeholder="Search city..." class="p-4 border border-gray-300 rounded-lg w-full md:w-2/3 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm mb-4 md:mb-0" />
                <button id="get-weather-btn" class="p-4 ml-0 md:ml-4 bg-gradient-btn text-white rounded-lg shadow-lg hover:bg-blue-500 transition w-full md:w-auto">Get Weather</button>
            </div>

            <!-- Weather Widget -->
            <div id="weather-widget" class="p-6 rounded-lg mb-8 bg-gradient-card text-white shadow-xl">
                <h2 class="text-2xl font-bold mb-4">Weather Data</h2>
                <div id="weather-data" class="text-lg">
                    <p>Enter a city to view the weather information.</p>
                </div>
                <img id="weather-icon" class="mt-6" alt="Weather Icon" src="" style="display: none" />
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="chart-container bg-white p-6 rounded-lg shadow-lg">
                    <h3 class="text-xl font-semibold mb-4">Temperature Over Time</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="chart-container bg-white p-6 rounded-lg shadow-lg">
                    <h3 class="text-xl font-semibold mb-4">Humidity Levels</h3>
                    <canvas id="doughnutChart"></canvas>
                </div>
                <div class="chart-container bg-white p-6 rounded-lg shadow-lg">
                    <h3 class="text-xl font-semibold mb-4">Wind Speed</h3>
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Link to External JavaScript File -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="dashboard.js"></script>

    <!-- JavaScript to toggle mobile sidebar -->
    <script>
        const menuToggle = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar");
        const closeSidebar = document.getElementById("close-sidebar");

        // Open sidebar on mobile
        menuToggle.addEventListener("click", () => {
            sidebar.classList.add("open");
        });

        // Close sidebar on mobile
        closeSidebar.addEventListener("click", () => {
            sidebar.classList.remove("open");
        });
    </script>
</body>

</html>
